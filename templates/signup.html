<!DOCTYPE html>
<html>
<head>
    <title>Register - bOPV E-Portal</title>
    <style>
        body{
            font-family: Arial, sans-serif;
            background:#f4f4f4;
        }

        .container{
            width:400px;
            margin:80px auto;
            background:white;
            padding:30px;
            border-radius:10px;
            box-shadow:0 0 10px rgba(0,0,0,0.1);
        }

        h2{
            text-align:center;
            color:#00695c;
        }

        input{
            width:100%;
            padding:10px;
            margin-top:5px;
            margin-bottom:15px;
            border:1px solid #ccc;
            border-radius:5px;
        }

        button{
            width:100%;
            padding:12px;
            background:#00796b;
            color:white;
            border:none;
            border-radius:5px;
            cursor:pointer;
        }

        button:hover{
            background:#005f56;
        }

        .login-link{
            text-align:center;
            margin-top:15px;
        }

        .login-link a{
            text-decoration:none;
            color:#00796b;
        }

        .flash{
            padding:12px;
            border-radius:5px;
            margin-bottom:15px;
        }

        .flash.success{
            background:#ecfdf5;
            color:#065f46;
            border:1px solid #99f6e4;
        }

        .flash.error{
            background:#fef2f2;
            color:#991b1b;
            border:1px solid #fecaca;
        }
    </style>
</head>
<body>

<div class="container">

    <h2>Create Account</h2>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="flash {{ category }}">{{ message }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form method="POST">
        <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">

        <label>Full Name</label>
        <input type="text" name="name" required>

        <label>Email Address</label>
        <input type="email" name="email" required>

        <label>Password</label>
        <input type="password" name="password" minlength="8" title="Use exactly 8 digits, or at least 8 letters/numbers with both letters and numbers." required>

        <label>Confirm Password</label>
        <input type="password" name="confirm_password" required>

        <button type="submit">Register</button>

    </form>

    <div class="login-link">
        <p>Already have an account?</p>
        <a href="/login">Login Here</a>
    </div>

</div>

</body>
</html>
